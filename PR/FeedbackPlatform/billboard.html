<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>物业投诉广告牌 · A3</title>
    <link rel="stylesheet" href="prototype.css" />
  </head>
  <body class="billboard-page">
    <article class="billboard-poster billboard-poster--a3" aria-label="物业问题投诉宣传页">
      <div class="billboard-poster__column">
        <h1 class="billboard-poster__title">物业问题投诉电话</h1>
        <div class="billboard-poster__contacts">
          <p><span class="lbl">XX社区</span><span class="sep">：</span><span class="tel">139****8888</span></p>
          <p><span class="lbl">XX街道</span><span class="sep">：</span><span class="tel">139****8888</span></p>
          <p><span class="lbl">长兴县建设局</span><span class="sep">：</span><span class="tel">139****8888</span></p>
        </div>
        <div class="billboard-poster__rule" aria-hidden="true"></div>
        <div class="billboard-poster__qr-wrap">
          <div class="billboard-poster__qr-frame">
            <img
              class="billboard-poster__qr"
              src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&amp;margin=6&amp;data=https%3A%2F%2Fwyfk.example.gov.cn%2Ffeedback"
              width="220"
              height="220"
              alt="扫码进入线上反馈"
            />
          </div>
        </div>
        <p class="billboard-poster__tagline">24小时内响应</p>
        <p class="billboard-poster__issuer">长兴县建设局</p>
      </div>
    </article>
  </body>
</html>
